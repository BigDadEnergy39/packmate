if (!window.storage) {
  window.storage = {
    async get(key) {
      const val = localStorage.getItem(key);
      if (val === null) throw new Error("Key not found");
      return { key, value: val };
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key) {
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
    async list(prefix) {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys };
    }
  };
}

const saveToStorage = async (key, value) => {
  try {
    await window.storage.set(key, JSON.stringify(value));
  } catch (e) {
    console.error("Storage save failed:", e);
  }
};

const loadFromStorage = async (key) => {
  try {
    const result = await window.storage.get(key);
    return result ? JSON.parse(result.value) : null;
  } catch (e) {
    return null;
  }
};

  const applyEdits = () => {
    if (!checklist) return;
    const template = getEffectiveActivityTemplate(checklist.activity);
    const effDuration = getEffectiveDurationItems();
    const prevAddons = new Set(checklist.addons || []);
    const nextAddons = new Set(editAddons);
    const addedAddons = editAddons.filter((a) => !prevAddons.has(a));
    const removedAddons = (checklist.addons || []).filter((a) => !nextAddons.has(a));
    const nightsChanged = editNights !== (checklist.nights || 1);

    // Helper: generate duration items for a person type at given nights
    const makeDurationItems = (personType, nts) => effDuration
      .filter((d) => nts >= d.minNights)
      .flatMap((d) =>
        (d.items[personType] || []).map((item) => {

            .replace(/\{nights\}/g, String(nts))

        }
        // Add new addon items
        const newAddonItems = addedAddons.flatMap((a) =>
          (allAddons[a]?.items[person.type] || []).map((item) => ({

        );

      } else {

          }))
        );
        const durationItems = makeDurationItems(person.type, editNights);
        const addonItems = editAddons.flatMap((a) =>
          (allAddons[a]?.items[person.type] || []).map((item) => ({
            id: generateId(), text: item, checked: false, addon: a,

        );
        return { person: { ...person }, items: [...baseItems, ...durationItems, ...addonItems, ...weatherItems] };
      }

    // Update group items
    let updatedGroupItems = (checklist.groupItems || []).filter((i) => !i.addon || !removedAddons.includes(i.addon));

      updatedGroupItems = [...updatedGroupItems, ...durationGroupItems];

      (allAddons[a]?.items?.group || []).map((item) => ({

    updatedGroupItems = [...updatedGroupItems, ...newAddonGroupItems];

    const hadMultiple = checklist.sections.length >= 2;
    const hasMultiple = editPeople.length >= 2;
    if (!hadMultiple && hasMultiple) {
      const baseGroupItems = (template.groupItems || []).map((item) => ({

    const hadPet = checklist.sections.some((s) => s.person.type === "pet");
    const hasPet = editPeople.some((p) => p.type === "pet");
    const babyKw = /baby|formula|sippy|onesie|infant|toddler/i;
    const petKw = /\bpet\b|dog food|cat food/i;
    let updatedFoodItems = [...(checklist.foodItems || [])];
    // Remove baby food items if baby removed
    if (hadBaby && !hasBaby) {
      updatedFoodItems = updatedFoodItems.filter((i) => !babyKw.test(i.text));

    if (hadPet && !hasPet) {
      updatedFoodItems = updatedFoodItems.filter((i) => !petKw.test(i.text));

    // Add baby food items if baby added
    if (!hadBaby && hasBaby) {

      const babyFoodItems = foodSource.filter((item) => babyKw.test(item)).map((item) => ({
        id: generateId(), text: item, checked: false, activity: checklist.activity,
      }));
      updatedFoodItems = [...updatedFoodItems, ...babyFoodItems];

      }));
      updatedFoodItems = [...updatedFoodItems, ...petFoodItems];

      nights: editNights,
      addons: editAddons,
      sections: updatedSections,

                            {cat.isCustom && (
                              <button onClick={() => deleteCustomActivity(cat.key)}
                                style={{ padding: "14px 16px", border: "1px solid #C4620E", borderRadius: 12, background: "transparent", color: "#C4620E", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}
                              >Delete</button>
                            )}
                            <button onClick={saveTplEditorOverride}
                              style={{ flex: 1, padding: "14px 20px", border: "none", borderRadius: 12, background: "#3B2510", color: "#F5E6C8", fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, cursor: "pointer", boxShadow: "0 4px 16px rgba(139,90,43,0.2)" }}
                            >Save Changes</button>
                          </div>
                        </>
                      );
                    })()}
                  </>
                )}
              </div>
            </div>
          )}

          {savedTrips.length > 0 && (
            <div style={{ marginTop: 40 }}>
              <h2 style={{ fontFamily: "'Caveat', cursive", fontSize: 22, color: "#5C3D1E", marginBottom: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ width: 30, height: 1, background: "rgba(139,90,43,0.3)", display: "inline-block" }} />
                Saved Expeditions
                <span style={{ width: 30, height: 1, background: "rgba(139,90,43,0.3)", display: "inline-block" }} />
              </h2>
              {savedTrips.map((trip) => {
                const tmpl = allActivities[trip.activity] || ACTIVITY_TEMPLATES[trip.activity];
                const total = trip.sections.reduce((a, s) => a + s.items.length, 0);
                const done = trip.sections.reduce((a, s) => a + s.items.filter((i) => i.checked).length, 0);
                const pct = total ? Math.round((done / total) * 100) : 0;
                return (
                  <div key={trip.id} style={{ background: "rgba(253,243,220,0.7)", borderRadius: 12, padding: "16px 18px", marginBottom: 10, cursor: "pointer", border: "1px solid rgba(139,90,43,0.1)", transition: "all 0.2s", position: "relative", borderLeft: `3px solid ${tmpl?.color || "#8B5A2B"}` }}
                    onClick={() => loadTrip(trip)}
                    onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 6px 20px rgba(59,37,16,0.1)"; }}
                    onMouseLeave={(e) => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
                  >
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <span style={{ fontSize: 26 }}>{tmpl?.icon}</span>
                        <div>
                          <div style={{ fontFamily: "'Caveat', cursive", fontWeight: 600, fontSize: 19, color: "#3B2510" }}>{trip.name}</div>
                          <div style={{ fontFamily: "'Crimson Pro', serif", fontSize: 13, color: "#8B5A2B", marginTop: 1, fontStyle: "italic" }}>
                            {trip.nights || 1} {(trip.nights || 1) === 1 ? "night" : "nights"} · {trip.sections.length} {trip.sections.length === 1 ? "traveler" : "travelers"} · {done}/{total} packed
                          </div>
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 42, height: 42, borderRadius: "50%", background: `conic-gradient(${tmpl?.color || "#3B2510"} ${pct * 3.6}deg, rgba(139,90,43,0.1) 0deg)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#EDD5A8", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 700, color: "#5C3D1E" }}>{pct}%</div>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); setConfirmDeleteId(trip.id); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, color: "#A8895A", padding: 4, opacity: 0.5 }}
                          onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
                          onMouseLeave={(e) => e.currentTarget.style.opacity = "0.5"}
                        >×</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Delete Confirmation Modal */}
          {confirmDeleteId && (() => {
            const trip = savedTrips.find((t) => t.id === confirmDeleteId);
            if (!trip) return null;
            const tmpl = allActivities[trip.activity] || ACTIVITY_TEMPLATES[trip.activity];
            return (
              <div style={{ position: "fixed", inset: 0, background: "rgba(59,37,16,0.5)", backdropFilter: "blur(4px)", zIndex: 100, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", overflowY: "auto" }}
                onClick={(e) => { if (e.target === e.currentTarget) setConfirmDeleteId(null); }}
              >
                <div style={{ background: "linear-gradient(170deg, #F5E6C8 0%, #EDD5A8 100%)", borderRadius: 20, padding: "28px 24px", width: "100%", maxWidth: 380, boxShadow: "0 20px 60px rgba(139,90,43,0.25)", textAlign: "center" }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>{tmpl?.icon || "📋"}</div>
                  <h3 style={{ fontFamily: "'Caveat', cursive", fontSize: 20, fontWeight: 800, margin: "0 0 8px" }}>Delete this trip?</h3>
                  <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#5C3D1E", margin: "0 0 4px", fontWeight: 600 }}>{trip.name}</p>
                  <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#8B5A2B", margin: "0 0 24px" }}>
                    This will permanently remove the trip and all its items. This can't be undone.
                  </p>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={() => setConfirmDeleteId(null)}
                      style={{ flex: 1, padding: "14px 20px", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 12, background: "transparent", color: "#5C3D1E", fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, cursor: "pointer" }}
                    >Cancel</button>
                    <button onClick={() => { deleteTrip(confirmDeleteId); setConfirmDeleteId(null); }}
                      style={{ flex: 1, padding: "14px 20px", border: "none", borderRadius: 12, background: "#C4620E", color: "#F5E6C8", fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, cursor: "pointer", boxShadow: "0 4px 16px rgba(196,98,14,0.25)" }}
                    >Delete</button>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      </div>
    );
  }

  // --- SETUP SCREEN ---
  if (screen === "setup") {
    return (
      <div style={wrapStyle}>
        <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Crimson+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
        <div style={parchmentOverlay} />
        <div style={globeOverlay} />
        <div style={containerStyle}>
          <button onClick={resetForNew} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Crimson Pro', serif", fontSize: 14, color: "#8B5A2B", marginBottom: 24, padding: 0, display: "flex", alignItems: "center", gap: 6, fontStyle: "italic" }}>
            ← Back to camp
          </button>

          <h1 style={{ fontFamily: "'Caveat', cursive", fontSize: 40, fontWeight: 700, margin: "0 0 8px", color: "#3B2510" }}>Plan Your Expedition</h1>
          <div style={{ width: 60, height: 2, background: "linear-gradient(90deg, rgba(139,90,43,0.4), transparent)", marginBottom: 32 }} />

          {/* Trip Name */}
          <div style={{ marginBottom: 32 }}>
            <label style={{ fontFamily: "'Caveat', cursive", fontSize: 20, color: "#5C3D1E", fontWeight: 600, display: "block", marginBottom: 10 }}>Trip Name</label>
            <input value={tripName} onChange={(e) => setTripName(e.target.value)} placeholder="The Lost Temple Expedition..."
              style={{ width: "100%", padding: "14px 18px", border: "none", borderBottom: "2px solid rgba(139,90,43,0.2)", borderRadius: 0, fontSize: 18, fontFamily: "'Caveat', cursive", background: "transparent", outline: "none", boxSizing: "border-box", color: "#3B2510" }}
            />
          </div>

          {/* Number of Nights */}
          <div style={{ marginBottom: 32 }}>
            <label style={{ fontFamily: "'Caveat', cursive", fontSize: 20, color: "#5C3D1E", fontWeight: 600, display: "block", marginBottom: 12 }}>Duration (nights)</label>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <button onClick={() => setNights(Math.max(0, nights - 1))}
                style={{ width: 40, height: 40, borderRadius: 10, border: "1.5px solid rgba(139,90,43,0.2)", background: "transparent", cursor: "pointer", fontSize: 20, fontWeight: 500, color: "#5C3D1E", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}
              >−</button>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                <span style={{ fontFamily: "'Caveat', cursive", fontSize: 40, fontWeight: 700, color: "#3B2510", minWidth: 30, textAlign: "center" }}>{nights}</span>
                <span style={{ fontFamily: "'Crimson Pro', serif", fontSize: 15, color: "#8B5A2B", fontStyle: "italic" }}>{nights === 1 ? "night" : "nights"}</span>
              </div>
              <button onClick={() => setNights(nights + 1)}
                style={{ width: 40, height: 40, borderRadius: 10, border: "1.5px solid rgba(139,90,43,0.2)", background: "transparent", cursor: "pointer", fontSize: 20, fontWeight: 500, color: "#5C3D1E", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}
              >+</button>
            </div>
            {nights === 0 && <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: 13, color: "#8B5A2B", marginTop: 8, fontStyle: "italic" }}>Day expedition — no overnight supplies needed</p>}
            {nights >= 2 && nights < 4 && <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: 13, color: "#8B5A2B", marginTop: 8, fontStyle: "italic" }}>Multi-day journey — toiletries & essentials included</p>}
            {nights >= 4 && nights < 7 && <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: 13, color: "#8B5A2B", marginTop: 8, fontStyle: "italic" }}>Extended expedition — laundry bag, extra shoes…</p>}
            {nights >= 7 && <p style={{ fontFamily: "'Crimson Pro', serif", fontSize: 13, color: "#8B5A2B", marginTop: 8, fontStyle: "italic" }}>Long journey — all provision tiers activated</p>}
          </div>

          {/* Activity Selection */}
          <div style={{ marginBottom: 32 }}>
            <label style={{ fontFamily: "'Caveat', cursive", fontSize: 20, color: "#5C3D1E", fontWeight: 600, display: "block", marginBottom: 12 }}>Activity</label>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
              {Object.entries(visibleActivities).map(([key, tmpl]) => (
                <button key={key} onClick={() => setSelectedActivity(key)}
                  style={{ padding: "14px 10px", border: selectedActivity === key ? `2px solid ${tmpl.color}` : "2px solid rgba(139,90,43,0.1)", borderRadius: 12, background: selectedActivity === key ? `${tmpl.color}12` : "rgba(253,243,220,0.5)", cursor: "pointer", textAlign: "center", transition: "all 0.2s" }}
                >
                  <div style={{ fontSize: 26, marginBottom: 4 }}>{tmpl.icon}</div>
                  <div style={{ fontFamily: "'Caveat', cursive", fontSize: 15, fontWeight: 600, color: selectedActivity === key ? tmpl.color : "#5C3D1E" }}>{tmpl.label}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Weather */}
          <div style={{ marginBottom: 32 }}>
            <label style={{ fontFamily: "'Caveat', cursive", fontSize: 20, color: "#5C3D1E", fontWeight: 600, display: "block", marginBottom: 12 }}>Weather Conditions</label>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {Object.entries(WEATHER_ADDITIONS).map(([key, w]) => {
                const active = selectedWeather.includes(key);
                return (
                  <button key={key} onClick={() => setSelectedWeather(active ? selectedWeather.filter((x) => x !== key) : [...selectedWeather, key])}
                    style={{ padding: "10px 18px", border: active ? "2px solid #3B2510" : "2px solid transparent", borderRadius: 40, background: active ? "rgba(139,90,43,0.08)" : "rgba(253,243,220,0.55)", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, display: "flex", alignItems: "center", gap: 6, transition: "all 0.2s" }}
                  >
                    <span>{w.icon}</span> {w.label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Activity Add-ons */}
          <div style={{ marginBottom: 32 }}>
            <label style={{ fontFamily: "'Caveat', cursive", fontSize: 20, color: "#5C3D1E", fontWeight: 600, display: "block", marginBottom: 12 }}>Add-ons</label>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {Object.entries(allAddons).map(([key, addon]) => {
                const active = selectedAddons.includes(key);
                const isCustom = addon.custom;
                return (
                  <div key={key} style={{ position: "relative", display: "inline-flex" }}>
                    <button onClick={() => setSelectedAddons(active ? selectedAddons.filter((x) => x !== key) : [...selectedAddons, key])}
                      style={{ padding: "10px 18px", border: active ? "2px solid #3B2510" : "2px solid transparent", borderRadius: 40, background: active ? "rgba(139,90,43,0.08)" : "rgba(253,243,220,0.55)", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, display: "flex", alignItems: "center", gap: 6, transition: "all 0.2s", paddingRight: isCustom ? 32 : 18 }}
                    >
                      <span>{addon.icon}</span> {addon.label}
                    </button>
                    {isCustom && (
                      <div style={{ position: "absolute", right: 2, top: "50%", transform: "translateY(-50%)", display: "flex", gap: 0 }}>
                        <button onClick={(e) => { e.stopPropagation(); openAddonBuilder(key); }}
                          style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, padding: "2px 4px", opacity: 0.5, color: "#3B2510" }}
                          onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
                          onMouseLeave={(e) => e.currentTarget.style.opacity = "0.5"}
                          title="Edit add-on"
                        >✎</button>
                      </div>
                    )}
                  </div>
                );
              })}
              <button onClick={() => openAddonBuilder()}
                style={{ padding: "10px 18px", border: "2px dashed rgba(139,90,43,0.2)", borderRadius: 40, background: "transparent", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, display: "flex", alignItems: "center", gap: 6, color: "#8B5A2B", transition: "all 0.2s" }}
                onMouseEnter={(e) => { e.currentTarget.style.borderColor = "rgba(139,90,43,0.4)"; e.currentTarget.style.color = "#3B2510"; }}
                onMouseLeave={(e) => { e.currentTarget.style.borderColor = "rgba(139,90,43,0.2)"; e.currentTarget.style.color = "#8B5A2B"; }}
              >
                + Create add-on
              </button>
            </div>
          </div>

          {/* Addon Builder Modal */}
          {addonBuilderOpen && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(59,37,16,0.5)", backdropFilter: "blur(4px)", zIndex: 100, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", overflowY: "auto" }}
              onClick={(e) => { if (e.target === e.currentTarget) closeAddonBuilder(); }}
            >
              <div style={{ background: "linear-gradient(170deg, #F5E6C8 0%, #EDD5A8 100%)", borderRadius: 20, padding: "28px 24px", width: "100%", maxWidth: 480, maxHeight: "85vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(139,90,43,0.25)" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
                  <h2 style={{ fontFamily: "'Caveat', cursive", fontSize: 26, fontWeight: 700, margin: 0 }}>
                    {editingAddon ? "Edit Add-on" : "Create Add-on"}
                  </h2>
                  <button onClick={closeAddonBuilder} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 22, color: "#8B5A2B", padding: 4 }}>×</button>
                </div>

                {/* Name & Icon */}
                <div style={{ marginBottom: 20 }}>
                  <label style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#8B5A2B", fontWeight: 600, display: "block", marginBottom: 8 }}>Name</label>
                  <input value={addonName} onChange={(e) => setAddonName(e.target.value)} placeholder="e.g. Archery, Photography..."
                    style={{ width: "100%", padding: "12px 16px", border: "1px solid rgba(139,90,43,0.12)", borderRadius: 10, fontSize: 15, fontFamily: "'DM Sans', sans-serif", background: "rgba(253,243,220,0.6)", outline: "none", boxSizing: "border-box", color: "#3B2510" }}
                  />
                </div>

                <div style={{ marginBottom: 24 }}>
                  <label style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#8B5A2B", fontWeight: 600, display: "block", marginBottom: 8 }}>Icon</label>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {ADDON_ICONS.map((icon) => (
                      <button key={icon} onClick={() => setAddonIcon(icon)}
                        style={{ width: 38, height: 38, borderRadius: 10, border: addonIcon === icon ? "2px solid #3B2510" : "2px solid transparent", background: addonIcon === icon ? "rgba(139,90,43,0.08)" : "rgba(253,243,220,0.55)", cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}
                      >{icon}</button>
                    ))}
                  </div>
                </div>

                {/* Person type tabs */}
                <div style={{ marginBottom: 16 }}>
                  <label style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#8B5A2B", fontWeight: 600, display: "block", marginBottom: 10 }}>Items by Type</label>
                  <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
                    {[...personTypes, { value: "group", label: "Group", icon: groupIcon }].map((pt) => {
                      const active = addonActiveTab === pt.value;
                      const count = { adult: addonItemsAdult, child: addonItemsChild, baby: addonItemsBaby, pet: addonItemsPet, group: addonItemsGroup }[pt.value].length;
                      return (
                        <button key={pt.value} onClick={() => setAddonActiveTab(pt.value)}
                          style={{ padding: "8px 14px", borderRadius: 10, border: active ? "2px solid #3B2510" : "2px solid rgba(139,90,43,0.1)", background: active ? "rgba(139,90,43,0.06)" : "transparent", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, display: "flex", alignItems: "center", gap: 5, transition: "all 0.15s", color: active ? "#3B2510" : "#8B5A2B" }}
                        >
                          {pt.icon} {pt.label} {count > 0 && <span style={{ background: "#3B2510", color: "#F5E6C8", borderRadius: 8, padding: "1px 6px", fontSize: 10, fontWeight: 700 }}>{count}</span>}
                        </button>
                      );
                    })}
                  </div>

                  {/* Items list for current tab */}
                  <div style={{ background: "rgba(253,243,220,0.55)", borderRadius: 12, padding: 12, minHeight: 60 }}>
                    {addonActiveTab === "group" && getAddonItemsForTab().length === 0 && (
                      <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#A8895A", textAlign: "center", margin: "12px 0" }}>
                        No group items yet — these go into the shared "Group Items" section
                      </p>
                    )}
                    {addonActiveTab !== "group" && getAddonItemsForTab().length === 0 && (
                      <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#A8895A", textAlign: "center", margin: "12px 0" }}>
                        No items yet for {[...personTypes, { value: "group", label: "Group" }].find((p) => p.value === addonActiveTab)?.label}
                      </p>
                    )}
                    {getAddonItemsForTab().map((item, idx) => (
                      <div key={idx} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 4px", borderBottom: idx < getAddonItemsForTab().length - 1 ? "1px solid rgba(139,90,43,0.05)" : "none" }}>
                        <span style={{ flex: 1, fontFamily: "'DM Sans', sans-serif", fontSize: 14 }}>{item}</span>
                        <button onClick={() => removeAddonItem(idx)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, color: "#C4620E", padding: 2, opacity: 0.6 }}
                          onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
                          onMouseLeave={(e) => e.currentTarget.style.opacity = "0.6"}
                        >×</button>
                      </div>
                    ))}
                    <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                      <input value={addonNewItem} onChange={(e) => setAddonNewItem(e.target.value)}
                        onKeyDown={(e) => { if (e.key === "Enter") addAddonItem(); }}
                        placeholder={`Add ${addonActiveTab === "group" ? "group" : [...personTypes].find((p) => p.value === addonActiveTab)?.label} item...`}
                        style={{ flex: 1, padding: "8px 12px", border: "1px solid rgba(139,90,43,0.12)", borderRadius: 8, fontSize: 13, fontFamily: "'DM Sans', sans-serif", background: "white", outline: "none" }}
                      />
                      <button onClick={addAddonItem}
                        style={{ background: "#3B2510", color: "#F5E6C8", border: "none", borderRadius: 8, padding: "8px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                      >Add</button>
                    </div>
                  </div>
                </div>

                {/* Save / Delete buttons */}
                <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
                  {editingAddon && (
                    <button onClick={() => { deleteCustomAddon(editingAddon); closeAddonBuilder(); }}
                      style={{ padding: "14px 20px", border: "1px solid #C4620E", borderRadius: 12, background: "transparent", color: "#C4620E", fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, cursor: "pointer" }}
                    >Delete</button>
                  )}
                  <button onClick={saveCustomAddon} disabled={!addonName.trim()}
                    style={{ flex: 1, padding: "14px 20px", border: "none", borderRadius: 12, background: addonName.trim() ? "#3B2510" : "#A8895A", color: "#F5E6C8", fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, cursor: addonName.trim() ? "pointer" : "not-allowed", boxShadow: addonName.trim() ? "0 4px 16px rgba(139,90,43,0.2)" : "none" }}
                  >{editingAddon ? "Save Changes" : "Create Add-on"}</button>
                </div>
              </div>
            </div>
          )}

          {/* People */}
          <div style={{ marginBottom: 32 }}>
            <label style={{ fontFamily: "'Caveat', cursive", fontSize: 20, color: "#5C3D1E", fontWeight: 600, display: "block", marginBottom: 12 }}>The Expedition Party</label>
            <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
              {personTypes.map((pt) => {
                const tmpl = selectedActivity ? getEffectiveActivityTemplate(selectedActivity) : null;
                const disabled = tmpl && (!tmpl.items[pt.value] || tmpl.items[pt.value].length === 0);
                return (
                  <button key={pt.value} onClick={() => !disabled && addPerson(pt.value)} disabled={disabled}
                    style={{ padding: "10px 18px", borderRadius: 40, border: "2px solid rgba(139,90,43,0.1)", background: disabled ? "rgba(0,0,0,0.03)" : "rgba(253,243,220,0.6)", cursor: disabled ? "not-allowed" : "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, display: "flex", alignItems: "center", gap: 6, opacity: disabled ? 0.4 : 1, transition: "all 0.2s" }}
                  >
                    <span>{pt.icon}</span> + {pt.label}
                  </button>
                );
              })}
            </div>
            {people.map((person) => {
              const pt = personTypes.find((p) => p.value === person.type);
              return (
                <div key={person.id} style={{ display: "flex", alignItems: "center", gap: 12, background: "rgba(253,243,220,0.55)", borderRadius: 12, padding: "10px 14px", marginBottom: 8 }}>
                  <span style={{ fontSize: 20 }}>{pt.icon}</span>
                  {personNameEdit === person.id ? (
                    <input autoFocus value={person.name}
                      onChange={(e) => setPeople(people.map((p) => p.id === person.id ? { ...p, name: e.target.value } : p))}
                      onBlur={() => setPersonNameEdit(null)}
                      onKeyDown={(e) => e.key === "Enter" && setPersonNameEdit(null)}
                      style={{ flex: 1, padding: "4px 8px", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 8, fontSize: 14, fontFamily: "'DM Sans', sans-serif", background: "white", outline: "none" }}
                    />
                  ) : (
                    <span style={{ flex: 1, fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 500, cursor: "pointer" }}
                      onClick={() => setPersonNameEdit(person.id)}
                    >{person.name} <span style={{ fontSize: 11, color: "#8B5A2B" }}>✎</span></span>
                  )}
                  <button onClick={() => removePerson(person.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#C4620E", padding: 4 }}>×</button>
                </div>
              );
            })}
          </div>

          {/* Generate Button */}
          <button onClick={generateChecklist} disabled={!selectedActivity || people.length === 0}
            style={{ width: "100%", padding: "18px 24px", background: !selectedActivity || people.length === 0 ? "#A8895A" : "linear-gradient(135deg, #5C3D1E 0%, #3B2510 100%)", color: "#EDD5A8", border: !selectedActivity || people.length === 0 ? "none" : "2px solid rgba(139,90,43,0.3)", borderRadius: 14, fontSize: 17, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, cursor: !selectedActivity || people.length === 0 ? "not-allowed" : "pointer", transition: "all 0.2s", boxShadow: !selectedActivity || people.length === 0 ? "none" : "0 4px 20px rgba(59,37,16,0.25), inset 0 1px 0 rgba(237,213,168,0.15)", letterSpacing: 0.5 }}
          >
            Begin the Expedition 🧭
          </button>
        </div>
      </div>
    );
  }

  // --- CHECKLIST SCREEN ---
  if (screen === "checklist" && checklist) {
    const tmpl = allActivities[checklist.activity] || ACTIVITY_TEMPLATES[checklist.activity];
    return (
      <div style={wrapStyle}>
        <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Crimson+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
        <div style={parchmentOverlay} />
        <div style={globeOverlay} />
        <div style={containerStyle}>
          {/* Header */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <button onClick={resetForNew} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Crimson Pro', serif", fontSize: 14, color: "#8B5A2B", padding: 0, display: "flex", alignItems: "center", gap: 6, fontStyle: "italic" }}>← Base camp</button>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={printChecklist} style={{ background: "rgba(139,90,43,0.08)", color: "#3B2510", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 10, padding: "8px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.2s", display: "flex", alignItems: "center", gap: 5 }}
                onMouseEnter={(e) => e.currentTarget.style.background = "rgba(139,90,43,0.15)"}
                onMouseLeave={(e) => e.currentTarget.style.background = "rgba(139,90,43,0.08)"}
              >🖨 Print</button>
              <button onClick={openEditMode} style={{ background: "rgba(139,90,43,0.08)", color: "#3B2510", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 10, padding: "8px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.2s", display: "flex", alignItems: "center", gap: 5 }}
                onMouseEnter={(e) => e.currentTarget.style.background = "rgba(139,90,43,0.15)"}
                onMouseLeave={(e) => e.currentTarget.style.background = "rgba(139,90,43,0.08)"}
              >✎ Edit</button>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 500, color: "#5C6B3A", display: "flex", alignItems: "center", gap: 4, padding: "8px 12px", background: "rgba(92,107,58,0.1)", borderRadius: 10, border: "1px solid rgba(92,107,58,0.15)" }}>✓ Logged</span>
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 6 }}>
            <span style={{ fontSize: 36, filter: "drop-shadow(0 2px 3px rgba(59,37,16,0.15))" }}>{tmpl.icon}</span>
            <h1 style={{ fontFamily: "'Caveat', cursive", fontSize: 34, fontWeight: 700, margin: 0, flex: 1, color: "#3B2510" }}>{checklist.name}</h1>
          </div>
          <div style={{ width: 50, height: 2, background: "linear-gradient(90deg, rgba(139,90,43,0.4), transparent)", marginBottom: 16 }} />

          {/* Overall Progress */}
          <div style={{ background: "rgba(253,243,220,0.55)", borderRadius: 14, padding: "16px 20px", marginBottom: 28, border: "1px solid rgba(139,90,43,0.08)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontFamily: "'Caveat', cursive", fontSize: 18, fontWeight: 600, color: "#5C3D1E" }}>Expedition Progress</span>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 700, color: tmpl.color }}>{progress.checked}/{progress.total} · {progress.pct}%</span>
            </div>
            <div style={{ height: 8, borderRadius: 4, background: "rgba(139,90,43,0.1)", overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${progress.pct}%`, background: `linear-gradient(90deg, ${tmpl.color}, ${tmpl.color}CC)`, borderRadius: 4, transition: "width 0.4s cubic-bezier(0.22, 1, 0.36, 1)" }} />
            </div>
            {progress.pct === 100 && (
              <div style={{ textAlign: "center", marginTop: 12, fontSize: 15, fontFamily: "'Caveat', cursive", color: tmpl.color, fontWeight: 600 }}>
                🧭 All supplies accounted for — adventure awaits!
              </div>
            )}
          </div>

          {/* Trip info badges */}
          <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
            <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, background: "rgba(253,243,220,0.6)", padding: "5px 12px", borderRadius: 20, color: "#5C3D1E" }}>
              🌄 {checklist.nights} {checklist.nights === 1 ? "night" : "nights"}
            </span>
            {checklist.weather.map((w) => (
              <span key={w} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, background: "rgba(253,243,220,0.6)", padding: "5px 12px", borderRadius: 20, color: "#5C3D1E" }}>
                {WEATHER_ADDITIONS[w].icon} {WEATHER_ADDITIONS[w].label}
              </span>
            ))}
            {(checklist.addons || []).map((a) => (
              <span key={a} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, background: "rgba(253,243,220,0.6)", padding: "5px 12px", borderRadius: 20, color: "#5C3D1E" }}>
                {allAddons[a]?.icon || "📋"} {allAddons[a]?.label || a}
              </span>
            ))}
          </div>

          {/* Group by activity toggle - only show if there are addon items */}
          {(checklist.addons || []).length > 0 && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, background: "rgba(253,243,220,0.45)", borderRadius: 12, padding: "10px 16px" }}>
              <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, color: "#5C3D1E" }}>Group add-on items by activity</span>
              <button onClick={toggleGroupByActivity}
                style={{ width: 48, height: 26, borderRadius: 13, border: "none", background: groupByActivity ? tmpl.color : "rgba(139,90,43,0.15)", cursor: "pointer", position: "relative", transition: "background 0.25s", padding: 0 }}
              >
                <div style={{ width: 20, height: 20, borderRadius: 10, background: "white", position: "absolute", top: 3, left: groupByActivity ? 25 : 3, transition: "left 0.25s cubic-bezier(0.22, 1, 0.36, 1)", boxShadow: "0 1px 4px rgba(0,0,0,0.15)" }} />
              </button>
            </div>
          )}

          {/* Food & Drinks Section */}
          {checklist.foodItems && checklist.foodItems.length > 0 && (() => {
            const fTotal = checklist.foodItems.length;
            const fChecked = checklist.foodItems.filter((i) => i.checked).length;
            const fPct = fTotal ? Math.round((fChecked / fTotal) * 100) : 0;
            const fUnchecked = checklist.foodItems.filter((i) => !i.checked);
            const fDone = checklist.foodItems.filter((i) => i.checked);
            return (
              <div style={{ marginBottom: 28, background: "rgba(253,243,220,0.6)", borderRadius: 14, border: `1px solid ${tmpl.color}22`, overflow: "hidden", borderLeft: `3px solid ${tmpl.color}60` }}>
                <div style={{ padding: "14px 18px", borderBottom: "1px dashed rgba(139,90,43,0.12)", display: "flex", alignItems: "center", justifyContent: "space-between", background: `${tmpl.color}06` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 20 }}>{foodIcon}</span>
                    <span style={{ fontFamily: "'Caveat', cursive", fontWeight: 700, fontSize: 20, color: "#3B2510" }}>Food & Drinks</span>
                  </div>
                  <span style={{ fontFamily: "'Crimson Pro', serif", fontSize: 12, fontWeight: 500, color: fPct === 100 ? "#5C6B3A" : "#8B5A2B", fontStyle: "italic" }}>
                    {fPct === 100 ? "✓ packed" : `${fChecked} of ${fTotal}`}
                  </span>
                </div>
                <div style={{ padding: "8px 12px" }}>
                  {fUnchecked.map((item) => (
                    <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 8px", borderRadius: 10, cursor: "pointer", transition: "background 0.15s" }}
                      onMouseEnter={(e) => e.currentTarget.style.background = "rgba(139,90,43,0.03)"}
                      onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                    >
                      <div onClick={() => toggleFoodItem(item.id)} style={{ width: 22, height: 22, borderRadius: 4, border: "2px solid rgba(139,90,43,0.25)", cursor: "pointer", flexShrink: 0, transition: "all 0.2s" }} />
                      <span style={{ flex: 1, fontFamily: "'Crimson Pro', serif", fontSize: 15, fontWeight: 400 }}>
                        {item.text}
                        {item.activity && allActivities[item.activity] && <span style={{ fontSize: 10, color: allActivities[item.activity].color, marginLeft: 6 }}>{allActivities[item.activity].icon}</span>}
                        {item.custom && <span style={{ fontSize: 10, color: "#C4620E", marginLeft: 6 }}>★</span>}
                      </span>
                      <button onClick={() => deleteFoodItem(item.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#A8895A", padding: 2, opacity: 0.5 }}
                        onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
                        onMouseLeave={(e) => e.currentTarget.style.opacity = "0.5"}
                      >×</button>
                    </div>
                  ))}
                  {fDone.length > 0 && (
                    <div style={{ borderTop: fUnchecked.length > 0 ? "1px dashed rgba(139,90,43,0.08)" : "none", marginTop: 4, paddingTop: 4 }}>
                      {fDone.map((item) => (
                        <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 8px", opacity: 0.45 }}>
                          <div onClick={() => toggleFoodItem(item.id)} style={{ width: 22, height: 22, borderRadius: 6, background: tmpl.color, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 12, fontWeight: 700 }}>✓</div>
                          <span style={{ flex: 1, fontFamily: "'Crimson Pro', serif", fontSize: 15, textDecoration: "line-through" }}>{item.text}</span>
                          <button onClick={() => deleteFoodItem(item.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#A8895A", padding: 2 }}>×</button>
                        </div>
                      ))}
                    </div>
                  )}
                  {addingFoodItem ? (
                    <div style={{ display: "flex", gap: 8, padding: "8px 8px", alignItems: "center" }}>
                      <input autoFocus value={newFoodItemText} onChange={(e) => setNewFoodItemText(e.target.value)}
                        onKeyDown={(e) => { if (e.key === "Enter") addCustomFoodItem(); if (e.key === "Escape") { setAddingFoodItem(false); setNewFoodItemText(""); } }}
                        placeholder="Add food or drink item..."
                        style={{ flex: 1, padding: "8px 12px", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 10, fontSize: 14, fontFamily: "'DM Sans', sans-serif", background: "white", outline: "none" }}
                      />
                      <button onClick={addCustomFoodItem} style={{ background: tmpl.color, color: "white", border: "none", borderRadius: 10, padding: "8px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Add</button>
                      <button onClick={() => { setAddingFoodItem(false); setNewFoodItemText(""); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#8B5A2B" }}>×</button>
                    </div>
                  ) : (
                    <button onClick={() => setAddingFoodItem(true)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: tmpl.color, padding: "10px 8px", fontWeight: 500 }}>
                      + Add food item
                    </button>
                  )}
                </div>
              </div>
            );
          })()}

          {/* Group Items Section */}
          {checklist.groupItems && checklist.groupItems.length > 0 && (() => {
            const gTotal = checklist.groupItems.length;
            const gChecked = checklist.groupItems.filter((i) => i.checked).length;
            const gPct = gTotal ? Math.round((gChecked / gTotal) * 100) : 0;
            const gUnchecked = checklist.groupItems.filter((i) => !i.checked);
            const gDone = checklist.groupItems.filter((i) => i.checked);
            return (
              <div style={{ marginBottom: 28, background: "rgba(253,243,220,0.6)", borderRadius: 14, border: `1px solid ${tmpl.color}22`, overflow: "hidden", borderLeft: `3px solid ${tmpl.color}60` }}>
                <div style={{ padding: "14px 18px", borderBottom: "1px dashed rgba(139,90,43,0.12)", display: "flex", alignItems: "center", justifyContent: "space-between", background: `${tmpl.color}06` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 20 }}>{groupIcon}</span>
                    <span style={{ fontFamily: "'Caveat', cursive", fontWeight: 700, fontSize: 20, color: "#3B2510" }}>Shared Gear</span>
                    <span style={{ fontFamily: "'Crimson Pro', serif", fontSize: 12, color: "#8B5A2B", fontWeight: 400, fontStyle: "italic" }}>for the group</span>
                  </div>
                  <span style={{ fontFamily: "'Crimson Pro', serif", fontSize: 12, fontWeight: 500, color: gPct === 100 ? "#5C6B3A" : "#8B5A2B", fontStyle: "italic" }}>
                    {gPct === 100 ? "✓ packed" : `${gChecked} of ${gTotal}`}
                  </span>
                </div>
                <div style={{ padding: "8px 12px" }}>
                  {gUnchecked.map((item) => (
                    <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 8px", borderRadius: 10, cursor: "pointer", transition: "background 0.15s" }}
                      onMouseEnter={(e) => e.currentTarget.style.background = "rgba(139,90,43,0.03)"}
                      onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                    >
                      <div onClick={() => toggleGroupItem(item.id)} style={{ width: 22, height: 22, borderRadius: 6, border: "2px solid rgba(139,90,43,0.2)", cursor: "pointer", flexShrink: 0, transition: "all 0.2s" }} />
                      <span style={{ flex: 1, fontFamily: "'Crimson Pro', serif", fontSize: 15, fontWeight: 400 }}>
                        {item.text}
                        {item.addon && <span style={{ fontSize: 10, color: "#1B7A8A", marginLeft: 6 }}>{allAddons[item.addon]?.icon || "📋"}</span>}
                        {item.custom && <span style={{ fontSize: 10, color: "#C4620E", marginLeft: 6 }}>★</span>}
                      </span>
                      <button onClick={() => deleteGroupItem(item.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#A8895A", padding: 2, opacity: 0.5 }}
                        onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
                        onMouseLeave={(e) => e.currentTarget.style.opacity = "0.5"}
                      >×</button>
                    </div>
                  ))}
                  {gDone.length > 0 && (
                    <div style={{ borderTop: gUnchecked.length > 0 ? "1px dashed rgba(139,90,43,0.08)" : "none", marginTop: 4, paddingTop: 4 }}>
                      {gDone.map((item) => (
                        <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 8px", opacity: 0.45 }}>
                          <div onClick={() => toggleGroupItem(item.id)} style={{ width: 22, height: 22, borderRadius: 6, background: tmpl.color, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 12, fontWeight: 700 }}>✓</div>
                          <span style={{ flex: 1, fontFamily: "'Crimson Pro', serif", fontSize: 15, textDecoration: "line-through" }}>{item.text}</span>
                          <button onClick={() => deleteGroupItem(item.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#A8895A", padding: 2 }}>×</button>
                        </div>
                      ))}
                    </div>
                  )}
                  {addingGroupItem ? (
                    <div style={{ display: "flex", gap: 8, padding: "8px 8px", alignItems: "center" }}>
                      <input autoFocus value={newGroupItemText} onChange={(e) => setNewGroupItemText(e.target.value)}
                        onKeyDown={(e) => { if (e.key === "Enter") addCustomGroupItem(); if (e.key === "Escape") { setAddingGroupItem(false); setNewGroupItemText(""); } }}
                        placeholder="Add group item..."
                        style={{ flex: 1, padding: "8px 12px", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 10, fontSize: 14, fontFamily: "'DM Sans', sans-serif", background: "white", outline: "none" }}
                      />
                      <button onClick={addCustomGroupItem} style={{ background: tmpl.color, color: "white", border: "none", borderRadius: 10, padding: "8px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Add</button>
                      <button onClick={() => { setAddingGroupItem(false); setNewGroupItemText(""); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#8B5A2B" }}>×</button>
                    </div>
                  ) : (
                    <button onClick={() => setAddingGroupItem(true)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: tmpl.color, padding: "10px 8px", fontWeight: 500 }}>
                      + Add group item
                    </button>
                  )}
                </div>
              </div>
            );
          })()}

          {/* Sections per person */}
          {checklist.sections.map((section, sIdx) => {
            const pt = personTypes.find((p) => p.value === section.person.type);
            // When groupByActivity is on, filter addon items out of person sections
            const visibleItems = groupByActivity
              ? section.items.filter((i) => !i.addon)
              : section.items;
            const unchecked = visibleItems.filter((i) => !i.checked);
            const checked = visibleItems.filter((i) => i.checked);
            const vTotal = visibleItems.length;
            const vChecked = checked.length;
            const vPct = vTotal ? Math.round((vChecked / vTotal) * 100) : 0;
            return (
              <div key={section.person.id} style={{ marginBottom: 28, background: "rgba(253,243,220,0.6)", borderRadius: 14, border: "1px solid rgba(139,90,43,0.08)", overflow: "hidden", borderLeft: `3px solid ${tmpl.color}40` }}>
                {/* Section Header */}
                <div style={{ padding: "14px 18px", borderBottom: "1px dashed rgba(139,90,43,0.12)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 20 }}>{pt.icon}</span>
                    <span style={{ fontFamily: "'Caveat', cursive", fontWeight: 700, fontSize: 20, color: "#3B2510" }}>{section.person.name}</span>
                  </div>
                  <span style={{ fontFamily: "'Crimson Pro', serif", fontSize: 12, fontWeight: 500, color: vPct === 100 ? "#5C6B3A" : "#8B5A2B", fontStyle: "italic" }}>
                    {vPct === 100 ? "✓ packed" : `${vChecked} of ${vTotal}`}
                  </span>
                </div>

                {/* Items */}
                <div style={{ padding: "8px 12px" }}>
                  {unchecked.map((item) => (
                    <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 8px", borderRadius: 10, cursor: "pointer", transition: "background 0.15s" }}
                      onMouseEnter={(e) => e.currentTarget.style.background = "rgba(139,90,43,0.03)"}
                      onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                    >
                      <div onClick={() => toggleItem(sIdx, item.id)} style={{ width: 22, height: 22, borderRadius: 6, border: "2px solid rgba(139,90,43,0.2)", cursor: "pointer", flexShrink: 0, transition: "all 0.2s" }} />
                      <span style={{ flex: 1, fontFamily: "'Crimson Pro', serif", fontSize: 15, fontWeight: 400 }}>
                        {item.text}
                        {item.addon && !groupByActivity && <span style={{ fontSize: 10, color: "#1B7A8A", marginLeft: 6 }}>{allAddons[item.addon]?.icon || "📋"}</span>}
                        {item.duration && <span style={{ fontSize: 10, color: "#7B2D8B", marginLeft: 6 }}>🌄</span>}
                        {item.weather && <span style={{ fontSize: 10, color: "#8B5A2B", marginLeft: 6 }}>☁️</span>}
                        {item.custom && <span style={{ fontSize: 10, color: "#C4620E", marginLeft: 6 }}>★</span>}
                      </span>
                      <button onClick={() => deleteItem(sIdx, item.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#A8895A", padding: 2, opacity: 0.5 }}
                        onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
                        onMouseLeave={(e) => e.currentTarget.style.opacity = "0.5"}
                      >×</button>
                    </div>
                  ))}

                  {/* Checked items (dimmed) */}
                  {checked.length > 0 && (
                    <div style={{ borderTop: unchecked.length > 0 ? "1px dashed rgba(139,90,43,0.08)" : "none", marginTop: 4, paddingTop: 4 }}>
                      {checked.map((item) => (
                        <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 8px", opacity: 0.45 }}>
                          <div onClick={() => toggleItem(sIdx, item.id)} style={{ width: 22, height: 22, borderRadius: 6, background: tmpl.color, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 12, fontWeight: 700 }}>✓</div>
                          <span style={{ flex: 1, fontFamily: "'Crimson Pro', serif", fontSize: 15, textDecoration: "line-through" }}>{item.text}</span>
                          <button onClick={() => deleteItem(sIdx, item.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#A8895A", padding: 2 }}>×</button>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Add custom item */}
                  {addingToPerson === sIdx ? (
                    <div style={{ display: "flex", gap: 8, padding: "8px 8px", alignItems: "center" }}>
                      <input autoFocus value={newItemText} onChange={(e) => setNewItemText(e.target.value)}
                        onKeyDown={(e) => { if (e.key === "Enter") addCustomItem(sIdx); if (e.key === "Escape") { setAddingToPerson(null); setNewItemText(""); } }}
                        placeholder="Add item..."
                        style={{ flex: 1, padding: "8px 12px", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 10, fontSize: 14, fontFamily: "'DM Sans', sans-serif", background: "white", outline: "none" }}
                      />
                      <button onClick={() => addCustomItem(sIdx)} style={{ background: tmpl.color, color: "white", border: "none", borderRadius: 10, padding: "8px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Add</button>
                      <button onClick={() => { setAddingToPerson(null); setNewItemText(""); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#8B5A2B" }}>×</button>
                    </div>
                  ) : (
                    <button onClick={() => setAddingToPerson(sIdx)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: tmpl.color, padding: "10px 8px", fontWeight: 500 }}>
                      + Add custom item
                    </button>
                  )}
                </div>
              </div>
            );
          })}

          {/* Activity-grouped sections (when toggle is on) */}
          {groupByActivity && (checklist.addons || []).map((addonKey) => {
            const addon = allAddons[addonKey];
            if (!addon) return null;
            // Collect all addon items across all person sections for this addon
            const addonEntries = [];
            checklist.sections.forEach((section, sIdx) => {
              section.items.forEach((item) => {
                if (item.addon === addonKey) {
                  addonEntries.push({ ...item, sIdx, personName: section.person.name, personIcon: personTypes.find((p) => p.value === section.person.type)?.icon || "🧭" });
                }
              });
            });
            if (addonEntries.length === 0) return null;
            const aUnchecked = addonEntries.filter((i) => !i.checked);
            const aChecked = addonEntries.filter((i) => i.checked);
            const aTotal = addonEntries.length;
            const aDone = aChecked.length;
            const aPct = aTotal ? Math.round((aDone / aTotal) * 100) : 0;
            return (
              <div key={addonKey} style={{ marginBottom: 28, background: "rgba(253,243,220,0.6)", backdropFilter: "blur(6px)", borderRadius: 18, border: "1.5px solid rgba(27,122,138,0.15)", overflow: "hidden" }}>
                <div style={{ padding: "16px 20px", borderBottom: "1px solid rgba(139,90,43,0.06)", display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(27,122,138,0.04)" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 22 }}>{addon.icon}</span>
                    <span style={{ fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 16 }}>{addon.label}</span>
                    <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#8B5A2B", fontWeight: 400 }}>add-on</span>
                  </div>
                  <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: aPct === 100 ? "#2D5016" : "#8B5A2B", background: aPct === 100 ? "rgba(45,80,22,0.1)" : "rgba(139,90,43,0.05)", padding: "4px 12px", borderRadius: 20 }}>
                    {aPct === 100 ? "✓ Done" : `${aDone}/${aTotal}`}
                  </span>
                </div>
                <div style={{ padding: "8px 12px" }}>
                  {aUnchecked.map((item) => (
                    <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 8px", borderRadius: 10, cursor: "pointer", transition: "background 0.15s" }}
                      onMouseEnter={(e) => e.currentTarget.style.background = "rgba(139,90,43,0.03)"}
                      onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                    >
                      <div onClick={() => toggleItem(item.sIdx, item.id)} style={{ width: 22, height: 22, borderRadius: 6, border: "2px solid rgba(139,90,43,0.2)", cursor: "pointer", flexShrink: 0, transition: "all 0.2s" }} />
                      <span style={{ flex: 1, fontFamily: "'Crimson Pro', serif", fontSize: 15, fontWeight: 400 }}>
                        {item.text}
                        <span style={{ fontSize: 11, color: "#8B5A2B", marginLeft: 8 }}>{item.personIcon} {item.personName}</span>
                      </span>
                      <button onClick={() => deleteItem(item.sIdx, item.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#A8895A", padding: 2, opacity: 0.5 }}
                        onMouseEnter={(e) => e.currentTarget.style.opacity = "1"}
                        onMouseLeave={(e) => e.currentTarget.style.opacity = "0.5"}
                      >×</button>
                    </div>
                  ))}
                  {aChecked.length > 0 && (
                    <div style={{ borderTop: aUnchecked.length > 0 ? "1px dashed rgba(139,90,43,0.08)" : "none", marginTop: 4, paddingTop: 4 }}>
                      {aChecked.map((item) => (
                        <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 8px", opacity: 0.45 }}>
                          <div onClick={() => toggleItem(item.sIdx, item.id)} style={{ width: 22, height: 22, borderRadius: 6, background: "#1B7A8A", cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 12, fontWeight: 700 }}>✓</div>
                          <span style={{ flex: 1, fontFamily: "'Crimson Pro', serif", fontSize: 15, textDecoration: "line-through" }}>
                            {item.text}
                            <span style={{ fontSize: 11, color: "#A8895A", marginLeft: 8 }}>{item.personIcon} {item.personName}</span>
                          </span>
                          <button onClick={() => deleteItem(item.sIdx, item.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#A8895A", padding: 2 }}>×</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {/* Edit Trip Modal */}
          {editMode && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(59,37,16,0.5)", backdropFilter: "blur(4px)", zIndex: 100, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", overflowY: "auto" }}
              onClick={(e) => { if (e.target === e.currentTarget) closeEditMode(); }}
            >
              <div style={{ background: "linear-gradient(170deg, #F5E6C8 0%, #EDD5A8 100%)", borderRadius: 20, padding: "28px 24px", width: "100%", maxWidth: 520, maxHeight: "85vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(139,90,43,0.25)" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
                  <h2 style={{ fontFamily: "'Caveat', cursive", fontSize: 26, fontWeight: 700, margin: 0 }}>Edit Trip</h2>
                  <button onClick={closeEditMode} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 22, color: "#8B5A2B", padding: 4 }}>×</button>
                </div>

                {/* Edit Nights */}
                <div style={{ marginBottom: 24 }}>
                  <label style={{ fontFamily: "'Caveat', cursive", fontSize: 18, color: "#5C3D1E", fontWeight: 600, display: "block", marginBottom: 10 }}>Duration (nights)</label>
                  <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                    <button onClick={() => setEditNights(Math.max(0, editNights - 1))}
                      style={{ width: 36, height: 36, borderRadius: 8, border: "1.5px solid rgba(139,90,43,0.2)", background: "transparent", cursor: "pointer", fontSize: 18, fontWeight: 500, color: "#5C3D1E", display: "flex", alignItems: "center", justifyContent: "center" }}
                    >−</button>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                      <span style={{ fontFamily: "'Caveat', cursive", fontSize: 32, fontWeight: 700, color: "#3B2510", minWidth: 24, textAlign: "center" }}>{editNights}</span>
                      <span style={{ fontFamily: "'Crimson Pro', serif", fontSize: 14, color: "#8B5A2B", fontStyle: "italic" }}>{editNights === 1 ? "night" : "nights"}</span>
                    </div>
                    <button onClick={() => setEditNights(editNights + 1)}
                      style={{ width: 36, height: 36, borderRadius: 8, border: "1.5px solid rgba(139,90,43,0.2)", background: "transparent", cursor: "pointer", fontSize: 18, fontWeight: 500, color: "#5C3D1E", display: "flex", alignItems: "center", justifyContent: "center" }}
                    >+</button>
                    {editNights !== (checklist?.nights || 1) && <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#C4620E", fontWeight: 600 }}>changed</span>}
                  </div>
                </div>

                {/* Edit People */}
                <div style={{ marginBottom: 28 }}>
                  <label style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#8B5A2B", fontWeight: 600, display: "block", marginBottom: 10 }}>People</label>
                  <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
                    {personTypes.map((pt) => {
                      const actTmpl = getEffectiveActivityTemplate(checklist.activity);
                      const disabled = actTmpl && (!actTmpl.items[pt.value] || actTmpl.items[pt.value].length === 0);
                      return (
                        <button key={pt.value} onClick={() => !disabled && addEditPerson(pt.value)} disabled={disabled}
                          style={{ padding: "8px 14px", borderRadius: 30, border: "2px solid rgba(139,90,43,0.1)", background: disabled ? "rgba(0,0,0,0.03)" : "rgba(253,243,220,0.6)", cursor: disabled ? "not-allowed" : "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, display: "flex", alignItems: "center", gap: 5, opacity: disabled ? 0.4 : 1 }}
                        >
                          {pt.icon} + {pt.label}
                        </button>
                      );
                    })}
                  </div>
                  {editPeople.map((person) => {
                    const pt = personTypes.find((p) => p.value === person.type);
                    const isExisting = checklist.sections.some((s) => s.person.id === person.id);
                    return (
                      <div key={person.id} style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(253,243,220,0.55)", borderRadius: 10, padding: "9px 12px", marginBottom: 6 }}>
                        <span style={{ fontSize: 18 }}>{pt.icon}</span>
                        {editPersonNameEdit === person.id ? (
                          <input autoFocus value={person.name}
                            onChange={(e) => setEditPeople(editPeople.map((p) => p.id === person.id ? { ...p, name: e.target.value } : p))}
                            onBlur={() => setEditPersonNameEdit(null)}
                            onKeyDown={(e) => e.key === "Enter" && setEditPersonNameEdit(null)}
                            style={{ flex: 1, padding: "3px 8px", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 6, fontSize: 13, fontFamily: "'DM Sans', sans-serif", background: "white", outline: "none" }}
                          />
                        ) : (
                          <span style={{ flex: 1, fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, cursor: "pointer" }}
                            onClick={() => setEditPersonNameEdit(person.id)}
                          >
                            {person.name} <span style={{ fontSize: 10, color: "#8B5A2B" }}>✎</span>
                            {!isExisting && <span style={{ fontSize: 10, color: "#2D5016", marginLeft: 6, fontWeight: 600 }}>NEW</span>}
                          </span>
                        )}
                        <button onClick={() => removeEditPerson(person.id)}
                          disabled={editPeople.length <= 1}
                          style={{ background: "none", border: "none", cursor: editPeople.length <= 1 ? "not-allowed" : "pointer", fontSize: 16, color: "#C4620E", padding: 2, opacity: editPeople.length <= 1 ? 0.2 : 0.6 }}
                        >×</button>
                      </div>
                    );
                  })}
                </div>

                {/* Edit Add-ons */}
                <div style={{ marginBottom: 28 }}>
                  <label style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#8B5A2B", fontWeight: 600, display: "block", marginBottom: 10 }}>Add-ons</label>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    {Object.entries(allAddons).map(([key, addon]) => {
                      const active = editAddons.includes(key);
                      return (
                        <button key={key} onClick={() => setEditAddons(active ? editAddons.filter((x) => x !== key) : [...editAddons, key])}
                          style={{ padding: "8px 16px", border: active ? "2px solid #3B2510" : "2px solid transparent", borderRadius: 30, background: active ? "rgba(139,90,43,0.08)" : "rgba(253,243,220,0.55)", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, display: "flex", alignItems: "center", gap: 5, transition: "all 0.2s" }}
                        >
                          <span>{addon.icon}</span> {addon.label}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Summary of changes */}
                {(() => {
                  const prevPersonIds = new Set(checklist.sections.map((s) => s.person.id));
                  const nextPersonIds = new Set(editPeople.map((p) => p.id));
                  const addedPeople = editPeople.filter((p) => !prevPersonIds.has(p.id));
                  const removedPeople = checklist.sections.filter((s) => !nextPersonIds.has(s.person.id));
                  const prevAddons = new Set(checklist.addons || []);
                  const nextAddonSet = new Set(editAddons);
                  const addedAddonKeys = editAddons.filter((a) => !prevAddons.has(a));
                  const removedAddonKeys = (checklist.addons || []).filter((a) => !nextAddonSet.has(a));
                  const hasChanges = addedPeople.length > 0 || removedPeople.length > 0 || addedAddonKeys.length > 0 || removedAddonKeys.length > 0;
                  // Also check for name changes
                  const nameChanges = editPeople.filter((ep) => {
                    const orig = checklist.sections.find((s) => s.person.id === ep.id);
                    return orig && orig.person.name !== ep.name;
                  });
                  const anyChange = hasChanges || nameChanges.length > 0;

                  if (!anyChange) return (
                    <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#A8895A", textAlign: "center", margin: "0 0 20px" }}>No changes yet</p>
                  );
                  return (
                    <div style={{ background: "rgba(45,80,22,0.05)", borderRadius: 12, padding: "12px 16px", marginBottom: 20, fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#5C3D1E" }}>
                      <div style={{ fontWeight: 600, marginBottom: 6, fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#8B5A2B" }}>Changes</div>
                      {addedPeople.map((p) => <div key={p.id}>+ Adding <strong>{p.name}</strong> ({p.type})</div>)}
                      {removedPeople.map((s) => <div key={s.person.id}>− Removing <strong>{s.person.name}</strong></div>)}
                      {addedAddonKeys.map((a) => <div key={a}>+ Adding <strong>{allAddons[a]?.label}</strong> add-on</div>)}
                      {removedAddonKeys.map((a) => <div key={a}>− Removing <strong>{allAddons[a]?.label}</strong> add-on</div>)}
                      {nameChanges.map((p) => {
                        const orig = checklist.sections.find((s) => s.person.id === p.id);
                        return <div key={p.id}>✎ Renaming <strong>{orig.person.name}</strong> → <strong>{p.name}</strong></div>;
                      })}
                      <div style={{ fontSize: 11, color: "#8B5A2B", marginTop: 8 }}>Existing checked items will be preserved.</div>
                    </div>
                  );
                })()}

                {/* Apply / Cancel */}
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={closeEditMode}
                    style={{ flex: 1, padding: "14px 20px", border: "1px solid rgba(139,90,43,0.15)", borderRadius: 12, background: "transparent", color: "#5C3D1E", fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, cursor: "pointer" }}
                  >Cancel</button>
                  <button onClick={applyEdits} disabled={editPeople.length === 0}
                    style={{ flex: 1, padding: "14px 20px", border: "none", borderRadius: 12, background: editPeople.length === 0 ? "#A8895A" : "#3B2510", color: "#F5E6C8", fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, cursor: editPeople.length === 0 ? "not-allowed" : "pointer", boxShadow: editPeople.length === 0 ? "none" : "0 4px 16px rgba(139,90,43,0.2)" }}
                  >Apply Changes</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PackMate));
</script>
<script>
// Register service worker for PWA / offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => console.log('SW registered:', reg.scope))
      .catch((err) => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
